<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectCard Rendering Test</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
        }

        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-family: monospace;
        }

        .pass {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .fail {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .test-header {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <header>
        <h1>ProjectCard Rendering Tests</h1>
    </header>

    <main>
        <div class="test-section">
            <div class="test-header">Test Results</div>
            <div id="test-results"></div>
        </div>

        <div class="test-section">
            <div class="test-header">Rendered Project Cards</div>
            <div id="project-grid" class="project-grid"></div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        const results = [];

        function addResult(testName, passed, message) {
            results.push({ testName, passed, message });
            const div = document.createElement('div');
            div.className = `test-result ${passed ? 'pass' : 'fail'}`;
            div.textContent = `${passed ? '✓' : '✗'} ${testName}: ${message}`;
            document.getElementById('test-results').appendChild(div);
        }

        // Test data
        const testProjects = [
            {
                name: 'UI Garden',
                description: 'A collection of reusable UI components and patterns',
                url: 'https://github.com/context-engineering/ui-garden',
                tags: ['UI', 'Components', 'React']
            },
            {
                name: 'Test Project 2',
                description: 'Another test project without tags',
                url: 'https://github.com/test/project2'
            },
            {
                name: 'Test Project 3',
                description: 'Third test project with different tags',
                url: 'https://github.com/test/project3',
                tags: ['JavaScript', 'Testing']
            }
        ];

        // Test 1: renderProjectCard creates a card element
        try {
            const card = renderProjectCard(testProjects[0]);
            const isElement = card instanceof HTMLElement;
            addResult('renderProjectCard - returns HTMLElement', isElement, 'Should return an HTMLElement');
        } catch (error) {
            addResult('renderProjectCard - returns HTMLElement', false, error.message);
        }

        // Test 2: Card has correct class
        try {
            const card = renderProjectCard(testProjects[0]);
            const hasClass = card.classList.contains('project-card');
            addResult('renderProjectCard - has project-card class', hasClass, 'Card should have project-card class');
        } catch (error) {
            addResult('renderProjectCard - has project-card class', false, error.message);
        }

        // Test 3: Card contains project name
        try {
            const card = renderProjectCard(testProjects[0]);
            const h3 = card.querySelector('h3');
            const hasName = h3 && h3.textContent === testProjects[0].name;
            addResult('renderProjectCard - contains name', hasName, 'Card should contain project name in h3');
        } catch (error) {
            addResult('renderProjectCard - contains name', false, error.message);
        }

        // Test 4: Card contains project description
        try {
            const card = renderProjectCard(testProjects[0]);
            const p = card.querySelector('p');
            const hasDescription = p && p.textContent === testProjects[0].description;
            addResult('renderProjectCard - contains description', hasDescription, 'Card should contain project description in p');
        } catch (error) {
            addResult('renderProjectCard - contains description', false, error.message);
        }

        // Test 5: Card contains project URL link
        try {
            const card = renderProjectCard(testProjects[0]);
            const link = card.querySelector('a');
            const hasUrl = link && link.href === testProjects[0].url;
            addResult('renderProjectCard - contains URL', hasUrl, 'Card should contain project URL in link');
        } catch (error) {
            addResult('renderProjectCard - contains URL', false, error.message);
        }

        // Test 6: Link opens in new tab
        try {
            const card = renderProjectCard(testProjects[0]);
            const link = card.querySelector('a');
            const opensInNewTab = link && link.getAttribute('target') === '_blank';
            addResult('renderProjectCard - link target="_blank"', opensInNewTab, 'Link should have target="_blank"');
        } catch (error) {
            addResult('renderProjectCard - link target="_blank"', false, error.message);
        }

        // Test 7: Link has security attributes
        try {
            const card = renderProjectCard(testProjects[0]);
            const link = card.querySelector('a');
            const hasSecurity = link && link.getAttribute('rel') === 'noopener noreferrer';
            addResult('renderProjectCard - link security', hasSecurity, 'Link should have rel="noopener noreferrer"');
        } catch (error) {
            addResult('renderProjectCard - link security', false, error.message);
        }

        // Test 8: Card is keyboard accessible
        try {
            const card = renderProjectCard(testProjects[0]);
            const hasTabindex = card.getAttribute('tabindex') === '0';
            addResult('renderProjectCard - keyboard accessible', hasTabindex, 'Card should have tabindex="0"');
        } catch (error) {
            addResult('renderProjectCard - keyboard accessible', false, error.message);
        }

        // Test 9: Card has ARIA attributes
        try {
            const card = renderProjectCard(testProjects[0]);
            const hasRole = card.getAttribute('role') === 'article';
            const hasLabel = card.hasAttribute('aria-label');
            const hasAria = hasRole && hasLabel;
            addResult('renderProjectCard - ARIA attributes', hasAria, 'Card should have role and aria-label');
        } catch (error) {
            addResult('renderProjectCard - ARIA attributes', false, error.message);
        }

        // Test 10: Card renders tags when present
        try {
            const card = renderProjectCard(testProjects[0]);
            const tagsContainer = card.querySelector('.project-card-tags');
            const hasTags = tagsContainer !== null;
            const tagCount = tagsContainer ? tagsContainer.querySelectorAll('.project-card-tag').length : 0;
            const correctCount = tagCount === testProjects[0].tags.length;
            addResult('renderProjectCard - renders tags', hasTags && correctCount, `Should render ${testProjects[0].tags.length} tags`);
        } catch (error) {
            addResult('renderProjectCard - renders tags', false, error.message);
        }

        // Test 11: Card without tags doesn't render tags container
        try {
            const card = renderProjectCard(testProjects[1]);
            const tagsContainer = card.querySelector('.project-card-tags');
            const noTags = tagsContainer === null;
            addResult('renderProjectCard - no tags when absent', noTags, 'Should not render tags container when tags absent');
        } catch (error) {
            addResult('renderProjectCard - no tags when absent', false, error.message);
        }

        // Test 12: renderAllProjects renders correct number of cards
        try {
            renderAllProjects(testProjects);
            const container = document.getElementById('project-grid');
            const cards = container.querySelectorAll('.project-card');
            const correctCount = cards.length === testProjects.length;
            addResult('renderAllProjects - correct count', correctCount, `Should render ${testProjects.length} cards`);
        } catch (error) {
            addResult('renderAllProjects - correct count', false, error.message);
        }

        // Test 13: renderAllProjects appends to container
        try {
            const container = document.getElementById('project-grid');
            const hasCards = container.children.length > 0;
            addResult('renderAllProjects - appends to container', hasCards, 'Should append cards to project-grid container');
        } catch (error) {
            addResult('renderAllProjects - appends to container', false, error.message);
        }

        // Test 14: Cards have staggered animation delays
        try {
            const container = document.getElementById('project-grid');
            const cards = container.querySelectorAll('.project-card');
            const firstDelay = cards[0].style.animationDelay;
            const secondDelay = cards[1].style.animationDelay;
            const hasStagger = firstDelay !== secondDelay;
            addResult('renderAllProjects - staggered animations', hasStagger, 'Cards should have different animation delays');
        } catch (error) {
            addResult('renderAllProjects - staggered animations', false, error.message);
        }

        // Summary
        setTimeout(() => {
            const totalTests = results.length;
            const passedTests = results.filter(r => r.passed).length;
            const failedTests = totalTests - passedTests;

            const summary = document.createElement('div');
            summary.className = `test-result ${failedTests === 0 ? 'pass' : 'fail'}`;
            summary.innerHTML = `<strong>Summary: ${passedTests}/${totalTests} tests passed</strong>`;
            document.getElementById('test-results').insertBefore(summary, document.getElementById('test-results').firstChild);
        }, 100);
    </script>
</body>

</html>
