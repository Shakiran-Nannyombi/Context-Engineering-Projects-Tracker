<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Context Engineered Projects - A visual showcase of our projects">
    <title>Context Engineered Projects</title>

    <!-- Performance Optimizations -->
    <!-- Preconnect to improve resource loading -->
    <link rel="preconnect" href="https://github.com" crossorigin>

    <!-- Preload critical resources -->
    <link rel="preload" href="styles.min.css" as="style">
    <link rel="preload" href="app.min.js" as="script">
    <link rel="preload" href="projects.json" as="fetch" crossorigin>

    <!-- Load minified CSS for faster parsing -->
    <link rel="stylesheet" href="styles.min.css">

    <!-- Inline critical CSS removed to support dark theme in styles.min.css -->
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <header>
        <h1>Context Engineered Projects</h1>
        <div class="header-profile">
            <img src="../assets/devK.png" alt="Dev Kiran" class="profile-image">
            <span class="profile-name">Dev Kiran</span>
        </div>
    </header>

    <main>
        <div id="project-grid" class="project-grid" role="list" aria-label="Context Engineered Projects">
            <!-- Project cards will be dynamically inserted here -->
        </div>
    </main>

    <footer>
        <p>
            <a href="https://github.com/context-engineering/Context-Engineering-Projects-Tracker" target="_blank"
                rel="noopener noreferrer">
                View Repository on GitHub
            </a>
        </p>
    </footer>

    <!-- Load minified JavaScript with defer for better performance -->
    <script src="app.min.js" defer></script>
</body>

</html>
